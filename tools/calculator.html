<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator — OmniPurpose</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>

<style>

body {
margin: 0;
height: 100vh;
background: linear-gradient(135deg, #0b1220, #1f2937);
display: flex;
align-items: center;
justify-content: center;
font-family: Arial;
}

.calculator {
background: #111827;
padding: 20px;
border-radius: 15px;
width: 340px;
box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.display {
width: 100%;
height: 70px;
background: black;
color: #38bdf8;
font-size: 28px;
text-align: right;
padding: 15px;
border-radius: 8px;
margin-bottom: 15px;
border: none;
}

.buttons {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 8px;
}

button {
height: 55px;
font-size: 16px;
border: none;
border-radius: 8px;
background: #1f2937;
color: white;
cursor: pointer;
}

button:hover {
background: #374151;
}

.operator {
background: #38bdf8;
color: black;
}

.operator:hover {
background: #0ea5e9;
}

.clear {
background: #ef4444;
}

.clear:hover {
background: #dc2626;
}

.func {
background: #10b981;
color: black;
}

.func:hover {
background: #059669;
}

.back {
text-align: center;
margin-top: 15px;
}

.back a {
color: #38bdf8;
text-decoration: none;
}

</style>

</head>

<body>

<div class="calculator">

<input class="display" id="display" readonly>

<div class="buttons">

<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('/')">÷</button>
<button onclick="append('*')">×</button>

<button onclick="sin()" class="func">sin</button>
<button onclick="cos()" class="func">cos</button>
<button onclick="tan()" class="func">tan</button>
<button onclick="sqrt()" class="func">√</button>
<button onclick="power()" class="func">x²</button>

<button onclick="log()" class="func">log</button>
<button onclick="ln()" class="func">ln</button>
<button onclick="append(Math.PI)">π</button>
<button onclick="append(Math.E)">e</button>
<button onclick="append('-')">−</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('+')" class="operator">+</button>
<button onclick="calculate()" class="operator">=</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('.')">.</button>
<button onclick="append('0')" style="grid-column: span 2;">0</button>

</div>

<div class="back">
<a href="/tools/">Back to Tools</a>
</div>

</div>

<script>

let display = document.getElementById("display");

function append(value){
display.value += value;
}

function clearDisplay(){
display.value = "";
}

function calculate(){
try{
display.value = eval(display.value);
}catch{
display.value = "Error";
}
}

function sin(){
display.value = Math.sin(eval(display.value));
}

function cos(){
display.value = Math.cos(eval(display.value));
}

function tan(){
display.value = Math.tan(eval(display.value));
}

function sqrt(){
display.value = Math.sqrt(eval(display.value));
}

function power(){
display.value = Math.pow(eval(display.value),2);
}

function log(){
display.value = Math.log10(eval(display.value));
}

function ln(){
display.value = Math.log(eval(display.value));
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Scientific Calculator — OmniPurpose</title>

<!-- AUTH -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#1f2937,#020617);
font-family:Segoe UI,Arial;
color:white;
}

/* calculator body */

.calculator{
background:#020617;
padding:20px;
border-radius:20px;
box-shadow:
0 0 40px rgba(56,189,248,0.15),
0 0 100px rgba(0,0,0,0.9);
width:360px;
}

/* display */

.display{
background:black;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.previous{
font-size:14px;
color:#6b7280;
min-height:18px;
}

.current{
font-size:32px;
color:#38bdf8;
word-wrap:break-word;
}

/* buttons */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:14px;
cursor:pointer;
background:#111827;
color:white;
transition:.2s;
}

button:hover{
background:#1f2937;
transform:scale(1.05);
}

.operator{
background:#0284c7;
}

.operator:hover{
background:#0369a1;
}

.function{
background:#059669;
}

.function:hover{
background:#047857;
}

.control{
background:#dc2626;
}

.control:hover{
background:#b91c1c;
}

.mode{
background:#7c3aed;
}

.mode:hover{
background:#6d28d9;
}

.memory{
background:#ea580c;
}

.memory:hover{
background:#c2410c;
}

footer{
text-align:center;
margin-top:10px;
font-size:12px;
color:#6b7280;
}

</style>

</head>
<body>

<div class="calculator">

<div class="display">

<div class="previous" id="previous"></div>

<div class="current" id="current">0</div>

</div>

<div class="grid">

<button class="control" onclick="clearAll()">AC</button>
<button class="control" onclick="back()">⌫</button>
<button class="mode" onclick="toggleMode()">DEG</button>
<button class="memory" onclick="memoryAdd()">M+</button>
<button class="memory" onclick="memoryRecall()">MR</button>

<button class="function" onclick="func('sin')">sin</button>
<button class="function" onclick="func('cos')">cos</button>
<button class="function" onclick="func('tan')">tan</button>
<button class="function" onclick="func('sqrt')">√</button>
<button onclick="append('(')">(</button>

<button class="function" onclick="func('log')">log</button>
<button class="function" onclick="func('ln')">ln</button>
<button class="function" onclick="append(Math.PI)">π</button>
<button class="function" onclick="append(Math.E)">e</button>
<button onclick="append(')')">)</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('/')">÷</button>
<button class="function" onclick="power()">x²</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('*')">×</button>
<button class="function" onclick="factorial()">n!</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('-')">−</button>
<button class="function" onclick="inverse()">1/x</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="operator" onclick="append('+')">+</button>
<button class="operator" onclick="calculate()">=</button>
<button class="function" onclick="percent()">%</button>

</div>

<footer>
OmniPurpose Scientific Calculator
</footer>

</div>

<script>

let current="0";
let previous="";
let degree=true;
let memory=0;

const currentEl=document.getElementById("current");
const previousEl=document.getElementById("previous");

function update(){
currentEl.innerText=current;
previousEl.innerText=previous;
}

function append(val){

if(current==="0") current="";

current+=val;

update();
}

function clearAll(){

current="0";
previous="";
update();
}

function back(){

current=current.slice(0,-1);
if(current==="") current="0";
update();
}

function calculate(){

try{

previous=current;

current=String(eval(current));

update();

}catch{

current="Error";
update();
}
}

function func(type){

let num=parseFloat(current);

if(degree)
num=num*Math.PI/180;

switch(type){

case "sin":
current=String(Math.sin(num));
break;

case "cos":
current=String(Math.cos(num));
break;

case "tan":
current=String(Math.tan(num));
break;

case "sqrt":
current=String(Math.sqrt(parseFloat(current)));
break;

case "log":
current=String(Math.log10(parseFloat(current)));
break;

case "ln":
current=String(Math.log(parseFloat(current)));
break;

}

update();
}

function power(){

current=String(Math.pow(parseFloat(current),2));
update();
}

function factorial(){

let n=parseInt(current);
let f=1;

for(let i=1;i<=n;i++) f*=i;

current=String(f);

update();
}

function inverse(){

current=String(1/parseFloat(current));
update();
}

function percent(){

current=String(parseFloat(current)/100);
update();
}

function toggleMode(){

degree=!degree;

document.querySelector(".mode").innerText=
degree?"DEG":"RAD";
}

function memoryAdd(){

memory+=parseFloat(current);
}

function memoryRecall(){

current=String(memory);
update();
}

update();

</script>

</body>
</html>

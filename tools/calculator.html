<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator — OmniPurpose</title>

<style>

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0b1220, #1f2937);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
}

.calculator {
  background: #111827;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.display {
  width: 100%;
  height: 60px;
  background: black;
  color: #38bdf8;
  font-size: 28px;
  text-align: right;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  box-sizing: border-box;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #374151;
}

.operator {
  background: #38bdf8;
  color: black;
}

.operator:hover {
  background: #0ea5e9;
}

.clear {
  background: #ef4444;
}

.clear:hover {
  background: #dc2626;
}

.back {
  text-align: center;
  margin-top: 15px;
}

.back a {
  color: #38bdf8;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="calculator">

<input class="display" id="display" readonly>

<div class="buttons">

<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="append('/')" class="operator">÷</button>
<button onclick="append('*')" class="operator">×</button>
<button onclick="append('-')" class="operator">−</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('+')" class="operator">+</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="calculate()" class="operator">=</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('.')">.</button>

<button onclick="append('0')" style="grid-column: span 4;">0</button>

</div>

<div class="back">
<a href="/tools/">Back to Tools</a>
</div>

</div>

<script>

let display = document.getElementById("display");

function append(value) {
  display.value += value;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}

</script>

</body>
</html>

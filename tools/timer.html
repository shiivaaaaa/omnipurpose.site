<title>Timer</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseClient = createClient(
"https://bhbdkarfpmvdbtdbsvmv.supabase.co",

<body style="background:#0b1220;color:white;text-align:center;margin-top:100px;">

<h2>Timer</h2>

<input id="sec" placeholder="Seconds">

<button onclick="start()">Start</button>

<h3 id="out"></h3>

<script>

function start(){
let s=document.getElementById("sec").value;

let i=setInterval(()=>{
s--;
document.getElementById("out").innerText=s;
if(s<=0) clearInterval(i);
},1000);

}

</script>

</body>

<!DOCTYPE html>
<html>
<head>
<title>OTP Login — OmniPurpose</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#0b1220;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

.card{
background:#111827;
padding:35px;
border-radius:12px;
width:340px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:5px;
}

button:hover{
background:#0ea5e9;
}

#otpSection{
display:none;
}

#msg{
margin-top:10px;
color:#9ca3af;
font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h2>Email OTP Login</h2>

<div id="emailSection">
<input type="email" id="email" placeholder="Enter your email">
<button onclick="sendOTP()">Send OTP</button>
</div>

<div id="otpSection">
<input type="text" id="otp" placeholder="Enter OTP code">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<p id="msg"></p>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://bhbdkarfpmvdbtdbsvmv.supabase.co",
"sb_publishable_yhjFWE2LvzK3n4omhwzFuA_N2blhp38"
);

async function sendOTP(){

const email=document.getElementById("email").value;

if(!email){
msg.innerText="Enter email first.";
return;
}

const { error } = await supabaseClient.auth.signInWithOtp({
email: email
});

if(error){
msg.innerText=error.message;
}else{
msg.innerText="OTP sent to your email.";
document.getElementById("otpSection").style.display="block";
}

}

async function verifyOTP(){

const email=document.getElementById("email").value;
const token=document.getElementById("otp").value;

const { error } = await supabaseClient.auth.verifyOtp({
email: email,
token: token,
type: "email"
});

if(error){
msg.innerText=error.message;
}else{
window.location.href="/tools/calculator.html";
}

}

</script>

</body>
</html>

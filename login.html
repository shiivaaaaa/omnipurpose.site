<!DOCTYPE html>
<html>
<head>
<title>Login — OmniPurpose</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
background:#0b1220;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}
.card{
background:#111827;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:5px;
border:none;
}
button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
<h2>Login</h2>

<input type="email" id="email" placeholder="Enter email">
<button onclick="sendOTP()">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>

<p id="msg"></p>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://bhbdkarfpmvdbtdbsvmv.supabase.co",
"sb_publishable_yhjFWE2LvzK3n4omhwzFuA_N2blhp38"
);

async function sendOTP(){

const email=document.getElementById("email").value;

const {error}=await supabaseClient.auth.signInWithOtp({
email:email
});

if(error){
msg.innerText=error.message;
}else{
msg.innerText="OTP sent to email.";
}
}

async function verifyOTP(){

const email=document.getElementById("email").value;
const token=document.getElementById("otp").value;

const {error}=await supabaseClient.auth.verifyOtp({
email:email,
token:token,
type:"email"
});

if(error){
msg.innerText=error.message;
}else{
window.location.href="/tools/calculator.html";
}
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>OTP Login — OmniPurpose</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#000000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
margin:0;
}

.card{
background:#0a0a0a;
padding:40px;
border-radius:12px;
width:360px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.8);
border:1px solid #111;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:6px;
border:1px solid #222;
background:#111;
color:white;
font-size:15px;
}

input:focus{
outline:none;
border:1px solid #38bdf8;
}

button{
width:100%;
padding:14px;
background:#111;
color:white;
border:1px solid #38bdf8;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:8px;
transition:0.2s;
}

button:hover{
background:#38bdf8;
color:black;
}

#otpSection{
display:none;
}

#msg{
margin-top:12px;
color:#888;
font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h2>Secure Login</h2>

<!-- EMAIL SECTION -->
<div id="emailSection">
<input type="email" id="email" placeholder="Enter your email">
<button onclick="sendOTP()">Send OTP</button>
</div>

<!-- OTP SECTION -->
<div id="otpSection">
<input type="text" id="otp" placeholder="Enter OTP code">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<p id="msg"></p>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://bhbdkarfpmvdbtdbsvmv.supabase.co",
"sb_publishable_yhjFWE2LvzK3n4omhwzFuA_N2blhp38"
);

async function sendOTP(){

const email=document.getElementById("email").value;

if(!email){
msg.innerText="Enter your email.";
return;
}

const { error } = await supabaseClient.auth.signInWithOtp({
email: email
});

if(error){
msg.innerText=error.message;
}else{
msg.innerText="OTP sent to your email.";
document.getElementById("otpSection").style.display="block";
}

}

async function verifyOTP(){

const email=document.getElementById("email").value;
const token=document.getElementById("otp").value;

if(!token){
msg.innerText="Enter OTP code.";
return;
}

const { error } = await supabaseClient.auth.verifyOtp({
email: email,
token: token,
type: "email"
});

if(error){
msg.innerText=error.message;
}else{
window.location.href="/tools/calculator.html";
}

}

</script>

</body>
</html>
